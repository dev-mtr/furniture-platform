name: Deploy DB

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
        - dev
        - prod

jobs:
  plan:
    name: Terraform Plan (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_KEY }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Write tfvars
      run: |
        cat > terraform.tfvars <<EOF
        supabase_access_token = "${{ secrets.SUPABASE_ACCESS_TOKEN }}"
        supabase_org_id       = "${{ secrets.SUPABASE_ORG_ID }}"
        database_password     = "${{ secrets.SUPABASE_DB_PASSWORD }}"
        project_name          = "furniture-platform-${{ github.event.inputs.environment }}"
        region                = "eu-central-1"
        EOF

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="key=furniture-platform-${{ github.event.inputs.environment }}/terraform.tfstate"

    - name: Terraform Plan
      run: terraform plan -out=tfplan

    - name: Upload Plan
      uses: actions/upload-artifact@v4
      with:
        name: tfplan-${{ github.event.inputs.environment }}
        path: terraform/tfplan

  apply:
    name: Terraform Apply (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    needs: plan
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_KEY }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Write tfvars
      run: |
        cat > terraform.tfvars <<EOF
        supabase_access_token = "${{ secrets.SUPABASE_ACCESS_TOKEN }}"
        supabase_org_id       = "${{ secrets.SUPABASE_ORG_ID }}"
        database_password     = "${{ secrets.SUPABASE_DB_PASSWORD }}"
        project_name          = "furniture-platform-${{ github.event.inputs.environment }}"
        region                = "eu-central-1"
        EOF

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="key=furniture-platform-${{ github.event.inputs.environment }}/terraform.tfstate"

    - name: Download Plan
      uses: actions/download-artifact@v4
      with:
        name: tfplan-${{ github.event.inputs.environment }}
        path: terraform

    - name: Terraform Apply
      run: terraform apply -auto-approve tfplan
